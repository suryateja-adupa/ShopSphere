{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h2 class="text-center mb-5">
        💳 Checkout
    </h2>

    <div class="row">

        <!-- Shipping Address -->

        <div class="col-md-7">

            <div class="card shadow p-4">

                <h4 class="mb-4">
                    Shipping Address
                </h4>

                <form method="POST">

                    {% csrf_token %}

                    <input
                        type="text"
                        name="full_name"
                        class="form-control mb-3"
                        placeholder="Full Name"
                        required>

                    <input
                        type="email"
                        name="email"
                        class="form-control mb-3"
                        placeholder="Email Address"
                        required>

                    <input
                        type="text"
                        name="phone"
                        class="form-control mb-3"
                        placeholder="Phone Number"
                        required>

                    <textarea
                        name="address"
                        class="form-control mb-3"
                        rows="4"
                        placeholder="Full Address"
                        required></textarea>

                    <input
                        type="text"
                        name="pincode"
                        class="form-control mb-3"
                        placeholder="Pincode"
                        required>

            </div>

        </div>

        <!-- Order Summary -->

        <div class="col-md-5">

            <div class="card shadow p-4">

                <h4>Order Summary</h4>

                <hr>

                <h5>Total Amount</h5>

                <h2 class="text-success">
                    ₹{{ grand_total }}
                </h2>
                <div class="mb-3">

                    <label class="form-label">
                        Payment Method
                    </label>

                    <select
                        name="payment_method"
                        class="form-select">

                        <option value="COD">
                            Cash on Delivery
                        </option>

                    </select>

                </div>
                <button
                    type="submit"
                    class="btn btn-success w-100 mt-4">

                    Place Order

                </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
