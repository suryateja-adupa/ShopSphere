{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h2 class="text-center mb-5">
        📦 My Orders
    </h2>

    {% if orders %}

        {% for order in orders %}

        <div class="card shadow mb-4">

            <div class="card-body">

                <div class="row align-items-center">

                    <div class="col-md-3">
                        <h5>Order #{{ order.id }}</h5>
                        <p>{{ order.created_at }}</p>
                    </div>

                    <div class="col-md-3">
                        <h6>Status</h6>
                        <span class="badge bg-warning text-dark">
                            {{ order.status }}
                        </span>
                    </div>

                    <div class="col-md-3">
                        <h6>Total</h6>
                        <h5 class="text-success">
                            ₹{{ order.total_price }}
                        </h5>
                    </div>

                    <div class="col-md-3">

                        <a href="{% url 'order_details' order.id %}"
                           class="btn btn-dark">

                            View Details

                        </a>

                    </div>

                </div>

            </div>

        </div>

        {% endfor %}

    {% else %}

        <div class="text-center">

            <h3>No Orders Yet</h3>

            <a href="{% url 'home' %}" class="btn btn-primary mt-3">
                Shop Now
            </a>

        </div>

    {% endif %}

</div>

{% endblock %}
